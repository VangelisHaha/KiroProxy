version: "3.8"

services:
  kiro-proxy:
    build: .
    container_name: kiro-proxy
    ports:
      - "${KIRO_SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      # Mount kiro-cli database for auth (optional)
      - ${HOME}/.local/share/kiro-cli:/home/kiro/.local/share/kiro-cli:ro
      # Mount AWS SSO cache for auth (optional)
      - ${HOME}/.aws/sso/cache:/home/kiro/.aws/sso/cache:ro
      # Persist logs
      - ./logs:/app/logs
    restart: unless-stopped
    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: "1.0"
